# 3DGS 部屋アーカイブ プロジェクト設定ファイル
# 動作環境: NVIDIA RTX 3050 (VRAM 8GB)

project:
  name: "room_archive"
  root: "."

paths:
  input_frames: "img/frames"
  processed: "data/processed"
  colmap_output: "data/colmap"
  training_data: "data/training"
  model_output: "output/models"
  render_output: "output/renders"
  gaussian_splatting: "gaussian-splatting"

preprocess:
  max_long_side: 1200
  blur_threshold: 10.0
  output_format: "jpg"
  jpeg_quality: 95

colmap:
  matcher: "exhaustive"
  use_gpu: true
  camera_model: "PINHOLE"
  single_camera: true

training:
  iterations: 30000
  save_iterations: [7000, 30000]
  test_iterations: [7000, 30000]
  densify_until_iter: 10000
  densify_from_iter: 500
  densification_interval: 100
  opacity_reset_interval: 3000
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  feature_lr: 0.0025
  sh_degree: 1
  white_background: false
  resolution: 2

render:
  skip_train: false
  skip_test: false
